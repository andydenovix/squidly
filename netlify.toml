[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Nightly scrape at 2am UTC to refresh cached knowledge
[functions."scrape.mjs"]
  schedule = "0 2 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "ALLOWALL"
    Access-Control-Allow-Origin = "*"
